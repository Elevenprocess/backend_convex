services:
  - type: web
    name: ecoi-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_REALTIME_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

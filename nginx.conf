server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite assets — long cache, immutable
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the HTML shell
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }

    # SPA fallback — every unknown path serves index.html so React Router can take over
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;
}

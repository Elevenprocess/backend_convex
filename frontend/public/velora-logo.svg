<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VELORA">
  <defs>
    <linearGradient id="velora-v" x1="80" y1="78" x2="160" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4E9667"/>
      <stop offset="1" stop-color="#2F6D49"/>
    </linearGradient>
  </defs>

  <!-- Grand anneau (fin) -->
